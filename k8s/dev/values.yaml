# Dev overlay for the trufflehog-analyzer.
# Single pod, no autoscaling, scaled-down resources. Secrets: dev/trufflehog.

replicaCount: 1

autoscaling:
  enabled: false

image:
  repository: 228304386839.dkr.ecr.us-west-2.amazonaws.com/k8s/trufflehog
  tag: dev

externalSecret:
  remoteKey: dev/trufflehog

# Public ingress. /analyze is gated by the TRUFFLEHOG_API_KEY bearer token; only
# /health is reachable unauthenticated. className/tls/cluster-issuer are
# inherited from the base values. Requires a Cloudflare DNS record for this host
# pointing at the nginx ingress LB before cert-manager can issue the TLS cert.
ingress:
  enabled: true
  host: trufflehog.unboundsec.dev

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: GENERIC_SECRET_SCORE
    value: "0.8"
  - name: ENTROPY_THRESHOLD
    value: "0.7"
  - name: ENABLE_GENERIC_SECRETS
    value: "false"
  - name: ENABLE_ENTROPY_PROXIMITY
    value: "true"
  - name: FP_SUPPRESSION_MODE
    value: "enforce"
  - name: VENDOR_STRUCTURAL_SUPPRESSION
    value: "enforce"