# Production overlay for the trufflehog-analyzer. Secrets: prod/trufflehog.

image:
  tag: prod

externalSecret:
  enabled: true
  remoteKey: prod/trufflehog
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

# Public ingress. /analyze is gated by the TRUFFLEHOG_API_KEY bearer token; only
# /health is reachable unauthenticated. className/tls/cluster-issuer are
# inherited from the base values. Requires a Cloudflare DNS record for this host
# pointing at the nginx ingress LB before cert-manager can issue the TLS cert.
ingress:
  enabled: true
  host: trufflehog.getunbound.ai

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 75

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Non-secret detection-tuning flags, version-controlled here (not in SM).
# The Deployment renders both envFrom: secretRef (SM, supplies TRUFFLEHOG_API_KEY)
# and this env: list; on key collision env: wins, which is what we want for these.
env:
  - name: GENERIC_SECRET_SCORE
    value: "0.8"
  - name: ENTROPY_THRESHOLD
    value: "0.7"
  - name: ENABLE_GENERIC_SECRETS
    value: "false"
  - name: ENABLE_ENTROPY_PROXIMITY
    value: "false"
  - name: FP_SUPPRESSION_MODE
    value: "off"