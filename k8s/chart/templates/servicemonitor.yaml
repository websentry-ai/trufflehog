{{- if .Values.serviceMonitor.enabled -}}
# ServiceMonitor — tells the Prometheus Operator to scrape this service.
# cmd/analyzer exposes /metrics (trufflehog_* series, counts only, no secrets).
# Gated on serviceMonitor.enabled. The cluster's kube-prometheus-stack
# runs with serviceMonitorSelectorNilUsesHelmValues=false, so any ServiceMonitor
# in any namespace is picked up automatically; set releaseLabel only when
# targeting a cluster that uses the default `release: <stack>` selector.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
    {{- with .Values.serviceMonitor.releaseLabel }}
    release: {{ . }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path | default "/metrics" }}
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | default "10s" }}
{{- end }}
