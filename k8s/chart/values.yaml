# Default values for the trufflehog-analyzer chart.
# Per-environment overlays (dev/, staging/, prod/) override the env-specific bits.
#
# The deployed workload is the cmd/analyzer HTTP service (see cmd/analyzer/main.go):
#   POST /analyze  — Bearer-auth (TRUFFLEHOG_API_KEY), scans request body for secrets
#   GET  /health   — unauthenticated liveness/readiness probe, returns {"status":"ok"}
# Listens on :8080 (Dockerfile sets ENV PORT=8080; service defaults to 8080 if unset).
# Stateless, internal-only — consumed over cluster DNS by the DLP pipeline.

replicaCount: 2

image:
  repository: 228304386839.dkr.ecr.us-west-2.amazonaws.com/k8s/trufflehog
  tag: dev              # env overlays override to staging | prod
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080            # cmd/analyzer HTTP port (matches Dockerfile EXPOSE 8080)

# Internal-only service. /analyze is Bearer-token gated and the only caller is
# in-cluster (DLP pipeline reaching trufflehog-<env>.<env>.svc.cluster.local:8080).
# A public ingress would add an HTTP attack surface plus a Cloudflare record and
# TLS cert with no external consumer. Disabled in every env by default; flip
# `ingress.enabled: true` (and set host) in an overlay if you need an external
# test endpoint.
ingress:
  enabled: false
  className: nginx
  host: ""
  tls: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

# The analyzer's single secret (TRUFFLEHOG_API_KEY, the /analyze Bearer token)
# is pulled from AWS Secrets Manager by ESO. The Deployment injects the whole
# map via envFrom: secretRef. Per-env overlay sets remoteKey.
#
# IMPORTANT: the SM value MUST be a JSON object, not a plaintext string —
# dataFrom.extract parses it as a map and emits one env var per key:
#   { "TRUFFLEHOG_API_KEY": "<random-bearer-token>" }
# A plaintext secret yields no TRUFFLEHOG_API_KEY env var and the process
# exits with `log.Fatal("TRUFFLEHOG_API_KEY is required")` (CrashLoopBackOff).
externalSecret:
  enabled: true
  remoteKey: dev/trufflehog   # env overlays override (staging/trufflehog | prod/trufflehog)
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

# Extra annotations injected into pod template metadata. Use to drive rotation
# without changing the image tag — e.g. kubectl.kubernetes.io/restartedAt.
podAnnotations: {}

# Default sizing. The analyzer builds an Aho-Corasick automaton over all default
# detectors at startup and holds it in memory; per-request work is bounded
# (1 MiB max body, 3s scan timeout). Env overlays should tune to the env load.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# HPA mirrors the dlp-analyzer sizing convention (min 2, max 10, 75% thresholds).
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 75

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# The Go service opens the listener only after the detector core is built, so
# /health responding ~= ready. Startup is fast (seconds), but the startup probe
# still gives headroom for detector-core init on a cold pod.
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12   # 5 + 12*5 = 65s max startup window

readinessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

# Additional non-sensitive env vars injected alongside the ExternalSecret envFrom.
# The secret (TRUFFLEHOG_API_KEY) comes from AWS Secrets Manager, NOT from here.
env: []

# ServiceMonitor for Prometheus scraping. Disabled by default — the cmd/analyzer
# service exposes no /metrics endpoint (only /analyze and /health). Kept as a
# gated template so metrics can be wired in later without re-adding the file.
serviceMonitor:
  enabled: false
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  releaseLabel: ""
